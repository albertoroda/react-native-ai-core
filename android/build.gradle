buildscript {
  ext.AiCore = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 26,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return AiCore[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.aicore"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
    freeCompilerArgs += ["-Xskip-metadata-version-check"]
  }
}

dependencies {
  implementation "com.facebook.react:react-android"

  // Google AI Edge — MediaPipe Tasks GenAI (modelo de archivo local)
  implementation "com.google.mediapipe:tasks-genai:0.10.22"

  // ML Kit GenAI Prompt API — accede a Gemini Nano vía AICore (Pixel 8+, sin archivo)
  implementation "com.google.mlkit:genai-prompt:1.0.0-beta2"

  // Coroutines (requerido por ML Kit Flow API)
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"

  // LiteRT-LM — inferencia con modelos .litertlm del catálogo Google AI Edge Gallery
  implementation "com.google.ai.edge.litertlm:litertlm-android:0.10.0"
}
